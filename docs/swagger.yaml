        in: path
        name: id
        required: true
        type: string
      - description: Binding type, default ci
        in: query
        name: binding_type
        type: string
      - description: Visible flag
        in: query
        name: visible
        type: boolean
      - description: Editable flag
        in: query
        name: editable
        type: boolean
      - description: Mapped platform param key
        in: query
        name: param_key
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
