          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      summary: Get pipeline by ID
      tags:
      - pipelines
  /pipelines/{id}/verify:
    post:
      parameters:
      - description: Pipeline ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.VerifyPipelineResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "500":
